<svg width="2400" height="1000" viewBox="0 0 2400 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Deep matte navy -->
  <rect width="2400" height="1000" fill="#0b1020" />
  
  <!-- Left Side: Hexagonal Network (Audit & Risk) -->
  <g id="left-network" stroke="#1e293b" stroke-width="1.5" fill="none">
    <!-- Main Hex Cluster -->
    <path d="M150,300 L350,200 L550,300 L550,500 L350,600 L150,500 Z" opacity="0.4" />
    <path d="M350,200 L350,50 M550,300 L750,250 M550,500 L750,550 M350,600 L350,850 M150,500 L-50,550" opacity="0.3" />
    <path d="M750,250 L950,350 L950,550 L750,650 L550,500" opacity="0.4" />
    
    <!-- Insight Nodes (Cyan Accents) -->
    <circle cx="550" cy="300" r="5" fill="#7dd3fc" stroke="#7dd3fc" stroke-width="2" />
    <circle cx="950" cy="350" r="4" fill="#7dd3fc" opacity="0.8" />
    <circle cx="350" cy="600" r="4" fill="#7dd3fc" opacity="0.6" />
    
    <!-- Structural Nodes (Dark Steel) -->
    <circle cx="150" cy="300" r="4" fill="#1e293b" />
    <circle cx="350" cy="200" r="4" fill="#1e293b" />
    <circle cx="550" cy="500" r="4" fill="#1e293b" />
    <circle cx="750" cy="250" r="4" fill="#1e293b" />
  </g>

  <!-- Right Side: Linear Flow (Intake) -->
  <g id="right-flow" stroke="#1e293b" stroke-width="1.5" fill="none">
    <!-- Horizontal Data Streams -->
    <path d="M1600,350 L1950,350 M1650,450 L2050,450 M1600,550 L1900,550" opacity="0.4" />
    <path d="M1950,350 L1950,200 L2200,200 M2050,450 L2300,450 M1900,550 L1900,700 L2150,700" opacity="0.3" />
    
    <!-- Insight Nodes (Cyan Accents) -->
    <circle cx="1950" cy="350" r="5" fill="#7dd3fc" stroke="#7dd3fc" stroke-width="2" />
    <circle cx="1650" cy="450" r="4" fill="#7dd3fc" opacity="0.7" />
    <circle cx="2050" cy="450" r="4" fill="#7dd3fc" opacity="0.5" />
    
    <!-- Structural Nodes -->
    <circle cx="1950" cy="200" r="4" fill="#1e293b" />
    <circle cx="1900" cy="550" r="4" fill="#1e293b" />
  </g>

  <!-- Center Framing: Very subtle geometric guides -->
  <g id="center-frame" stroke="#1e293b" stroke-width="1" opacity="0.15">
    <path d="M1000,400 L1100,400 M1300,400 L1400,400" />
    <path d="M1000,600 L1100,600 M1300,600 L1400,600" />
  </g>
</svg>
