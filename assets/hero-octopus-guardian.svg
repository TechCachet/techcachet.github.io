<svg width="2400" height="1000" viewBox="0 0 2400 1000" xmlns="http://www.w3.org/2000/svg">
  <rect width="2400" height="1000" fill="#0b1020" />
  
  <!-- Guardian Octopus - Task Oriented -->
  <g id="octopus-guardian" fill="none" stroke="#7dd3fc" stroke-width="2">
    <!-- Body -->
    <path d="M1150,250 Q1250,150 1350,250 Q1400,400 1250,450 Q1100,400 1150,250 Z" fill="#0b1020" stroke-width="3" opacity="0.9"/>
    
    <!-- Arm 1: The Magnifying Glass (Audit) -->
    <path d="M1180,380 Q1000,350 850,250" />
    <circle cx="830" cy="235" r="25" stroke="#7dd3fc" stroke-width="3" />
    <line x1="845" y1="250" x2="865" y2="270" stroke="#7dd3fc" stroke-width="3" />
    
    <!-- Arm 2: The Catch (Secrets Finder) -->
    <path d="M1160,420 Q1050,550 900,600" />
    <rect x="880" y="580" width="40" height="40" stroke="#f87171" stroke-width="2" fill="none" transform="rotate(45 900 600)"/>
    <circle cx="900" cy="600" r="4" fill="#f87171" />
    
    <!-- Arm 3: The Filing (Intake) -->
    <path d="M1320,380 Q1500,350 1650,300" />
    <rect x="1650" y="280" width="60" height="40" stroke="#7dd3fc" stroke-width="2" />
    <path d="M1660,295 H1700 M1660,305 H1700" stroke="#1e293b" />
    
    <!-- Arm 4: Stability -->
    <path d="M1340,420 Q1500,550 1700,700" stroke-opacity="0.5" />
  </g>
  
  <!-- Subtle dark grid -->
  <path d="M0,0 L2400,0 M0,200 L2400,200 M0,400 L2400,400 M0,600 L2400,600 M0,800 L2400,800" stroke="#1e293b" stroke-width="1" opacity="0.1"/>
</svg>
