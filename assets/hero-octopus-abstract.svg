<svg width="2400" height="1000" viewBox="0 0 2400 1000" xmlns="http://www.w3.org/2000/svg">
  <rect width="2400" height="1000" fill="#0b1020" />
  
  <!-- Abstract Ghost Octopus - Entirely Node/Line based -->
  <g id="octopus-abstract" fill="none" stroke="#7dd3fc" stroke-width="1.5">
    <!-- The Head Cluster -->
    <path d="M1150,350 L1250,250 L1350,350 L1250,450 Z" opacity="0.6"/>
    <circle cx="1200" cy="330" r="3" fill="#7dd3fc" />
    <circle cx="1300" cy="330" r="3" fill="#7dd3fc" />
    
    <!-- Flowing Tentacle Streams -->
    <!-- Group Left -->
    <path d="M1180,380 C1000,400 800,200 600,250" opacity="0.4" />
    <path d="M1160,400 C1000,450 800,500 650,550" opacity="0.6" />
    <path d="M1180,420 C1050,500 950,700 800,850" opacity="0.3" />
    
    <!-- Group Right -->
    <path d="M1320,380 C1500,400 1700,200 1900,250" opacity="0.4" />
    <path d="M1340,400 C1500,450 1700,500 1850,550" opacity="0.6" />
    <path d="M1320,420 C1450,500 1550,700 1700,850" opacity="0.3" />
    
    <!-- Joint Nodes -->
    <circle cx="1000" cy="410" r="3" fill="#1e293b" stroke="#7dd3fc" stroke-width="1" />
    <circle cx="1500" cy="410" r="3" fill="#1e293b" stroke="#7dd3fc" stroke-width="1" />
    <circle cx="800" cy="500" r="3" fill="#1e293b" stroke="#7dd3fc" stroke-width="1" />
    <circle cx="1700" cy="500" r="3" fill="#1e293b" stroke="#7dd3fc" stroke-width="1" />
  </g>
</svg>
